{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Семейные ценности — дом, уют, забота{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Georgia:ital@0;1&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .serif { font-family: 'Georgia', serif; }

        /* Кастомизация выпадающих списков */
        .custom-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236b7280' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1rem;
            padding-right: 2rem !important;
        }

        /* При фокусе — меняем цвет стрелки */
        .custom-select:focus {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23d97706' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
        }

        /* Для Firefox */
        .custom-select::-ms-expand {
            display: none;
        }

        @media (max-width: 768px) {
            .method-info-btn,
            .preparation-info-btn,
            .utensil-info-btn {
                padding: 0.5rem;
                margin: -0.5rem;
            }
            .method-info-btn i,
            .preparation-info-btn i,
            .utensil-info-btn i {
                font-size: 1.25rem;
            }
        }

        @media print {
            nav, footer, .no-print {
                display: none !important;
            }
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body class="bg-white text-gray-800">

    <!-- НАВИГАЦИЯ -->
    {% include 'includes/navigation.html' %}

    <!-- ОСНОВНОЕ СОДЕРЖИМОЕ -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- ФУТЕР -->
    {% include 'includes/footer.html' %}

    {% block extra_js %}{% endblock %}
</body>
</html>
