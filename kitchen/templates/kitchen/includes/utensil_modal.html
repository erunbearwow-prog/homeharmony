<!-- Модальное окно для рекомендуемой утвари -->
<div id="utensilModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden no-print">
    <div class="bg-white rounded-2xl p-6 max-w-2xl w-full mx-4 shadow-xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-2xl font-bold serif flex items-center gap-2">
                <i class="fas fa-utensils text-blue-600"></i>
                <span id="utensilModalName">Рекомендованная утварь</span>
            </h3>
            <button onclick="closeUtensilModal()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="utensilModalDesc" class="text-gray-700 leading-relaxed mb-4"></div>
        <div id="utensilModalAlternative" class="mb-4 bg-yellow-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-yellow-800 mb-2">🔄 Чем можно заменить</h4>
            <p id="utensilModalAlternativeText" class="text-yellow-700"></p>
        </div>
        <div id="utensilModalCare" class="mb-4 bg-gray-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-gray-800 mb-2">🧼 Уход и обслуживание</h4>
            <p id="utensilModalCareText" class="text-gray-700"></p>
        </div>
        <div class="flex justify-end mt-4 pt-3 border-t">
            <button onclick="closeUtensilModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition">Закрыть</button>
        </div>
    </div>
</div>
