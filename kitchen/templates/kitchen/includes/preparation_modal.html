<!-- Модальное окно для подготовки продуктов -->
<div id="preparationModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden no-print">
    <div class="bg-white rounded-2xl p-6 max-w-2xl w-full mx-4 shadow-xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-2xl font-bold serif flex items-center gap-2">
                <i class="fas fa-kitchen-set text-green-600"></i>
                <span id="preparationModalName">Подготовка продуктов</span>
            </h3>
            <button onclick="closePreparationModal()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="preparationModalDesc" class="text-gray-700 leading-relaxed mb-4"></div>
        <div id="preparationModalTips" class="mb-4 bg-green-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-green-800 mb-2">💡 Советы</h4>
            <p id="preparationModalTipsText" class="text-green-700"></p>
        </div>
        <div id="preparationModalTime" class="mb-4 bg-blue-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-blue-800 mb-2">⏱️ Влияние на время</h4>
            <p id="preparationModalTimeText" class="text-blue-700"></p>
        </div>
        <div class="flex justify-end mt-4 pt-3 border-t">
            <button onclick="closePreparationModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition">Закрыть</button>
        </div>
    </div>
</div>
