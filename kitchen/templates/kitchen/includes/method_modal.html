<!-- Модальное окно с подробным описанием метода приготовления -->
<div id="methodModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden no-print">
    <div class="bg-white rounded-2xl p-6 max-w-2xl w-full mx-4 shadow-xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-4">
            <h3 class="text-2xl font-bold serif flex items-center gap-2">
                <i id="methodModalIcon" class="fas fa-fire text-amber-600"></i>
                <span id="methodModalName">Название метода</span>
            </h3>
            <button onclick="closeMethodModal()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div id="methodModalShortDesc" class="text-gray-600 italic mb-4 border-l-4 border-amber-300 pl-3"></div>

        <div class="mb-4">
            <h4 class="font-semibold text-gray-800 mb-2">📖 Подробное описание</h4>
            <p id="methodModalDesc" class="text-gray-700 leading-relaxed"></p>
        </div>

        <div id="methodModalScience" class="mb-4 bg-gray-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-gray-800 mb-2">🔬 Научное обоснование</h4>
            <p id="methodModalScienceText" class="text-gray-600 text-sm"></p>
        </div>

        <div class="grid md:grid-cols-2 gap-4 mb-4">
            <div id="methodModalTemp" class="bg-red-50 p-3 rounded-lg hidden">
                <h4 class="font-semibold text-red-800 mb-1">🌡️ Типичная температура</h4>
                <p id="methodModalTempText" class="text-red-700"></p>
            </div>
            <div id="methodModalDuration" class="bg-blue-50 p-3 rounded-lg hidden">
                <h4 class="font-semibold text-blue-800 mb-1">⏱️ Типичная длительность</h4>
                <p id="methodModalDurationText" class="text-blue-700"></p>
            </div>
        </div>

        <div id="methodModalTips" class="mb-4 bg-green-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-green-800 mb-2">💡 Советы и хитрости</h4>
            <p id="methodModalTipsText" class="text-green-700"></p>
        </div>

        <div id="methodModalMistakes" class="mb-4 bg-yellow-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-yellow-800 mb-2">⚠️ Типичные ошибки</h4>
            <p id="methodModalMistakesText" class="text-yellow-700"></p>
        </div>

        <div id="methodModalAdvanced" class="mb-4 bg-purple-50 p-3 rounded-lg hidden">
            <h4 class="font-semibold text-purple-800 mb-2">👨‍🍳 Для опытных кулинаров</h4>
            <p id="methodModalAdvancedText" class="text-purple-700"></p>
        </div>

        <div class="flex justify-end mt-4 pt-3 border-t">
            <button onclick="window.closeMethodModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition">Закрыть</button>
        </div>
    </div>
</div>
